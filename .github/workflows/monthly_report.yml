name: 月次収支レポート自動生成

on:
  # data/ フォルダにCSVがpushされたら自動実行
  push:
    paths:
      - "data/*.csv"
    branches:
      - main

  # 毎月末にリマインド（data/にCSVがあれば処理）
  schedule:
    - cron: "0 14 28-31 * *"

  # 手動実行
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # スケジュール実行時の月末チェック
      - name: 月末日チェック
        id: check-last-day
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TOMORROW=$(date -u -d "+1 day" +%d)
            if [ "$TOMORROW" != "01" ]; then
              echo "今日は月末ではありません。スキップします。"
              echo "is_last_day=false" >> "$GITHUB_OUTPUT"
            else
              echo "is_last_day=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_last_day=true" >> "$GITHUB_OUTPUT"
          fi

      - name: リポジトリをチェックアウト
        if: steps.check-last-day.outputs.is_last_day == 'true'
        uses: actions/checkout@v4

      - name: CSVファイルの存在チェック
        if: steps.check-last-day.outputs.is_last_day == 'true'
        id: check-csv
        run: |
          CSV_COUNT=$(find data/ -name "*.csv" 2>/dev/null | wc -l)
          echo "csv_count=$CSV_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$CSV_COUNT" -eq 0 ]; then
            echo "::warning::data/ フォルダにCSVファイルがありません。"
            echo "マネーフォワードからCSVをダウンロードし、data/ フォルダにpushしてください。"
          else
            echo "CSVファイルが ${CSV_COUNT} 件見つかりました:"
            ls -la data/*.csv
          fi

      - name: Python セットアップ
        if: steps.check-last-day.outputs.is_last_day == 'true' && steps.check-csv.outputs.csv_count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        if: steps.check-last-day.outputs.is_last_day == 'true' && steps.check-csv.outputs.csv_count != '0'
        run: pip install -r requirements.txt

      - name: Secrets設定チェック
        if: steps.check-last-day.outputs.is_last_day == 'true' && steps.check-csv.outputs.csv_count != '0'
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          HAS_SHEETS=true
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then echo "⚠ GOOGLE_CREDENTIALS_JSON 未設定 → Excel出力のみ"; HAS_SHEETS=false; fi
          if [ -z "$SPREADSHEET_ID" ]; then echo "⚠ SPREADSHEET_ID 未設定 → Excel出力のみ"; HAS_SHEETS=false; fi
          echo "has_sheets=$HAS_SHEETS" >> "$GITHUB_OUTPUT"

      - name: Google認証ファイルを準備
        if: steps.check-last-day.outputs.is_last_day == 'true' && steps.check-csv.outputs.csv_count != '0'
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_CREDENTIALS_JSON" > /tmp/gcp_credentials.json
            # JSONとして正しいか検証
            if python3 -c "import json; json.load(open('/tmp/gcp_credentials.json'))"; then
              echo "✅ Google認証ファイルの準備完了"
            else
              echo "::error::GOOGLE_CREDENTIALS_JSON の内容が正しいJSON形式ではありません"
              echo "Settings → Secrets で、ダウンロードしたJSONファイルの中身をそのまま貼り付けてください"
              rm -f /tmp/gcp_credentials.json
            fi
          fi

      - name: レポートを生成する
        if: steps.check-last-day.outputs.is_last_day == 'true' && steps.check-csv.outputs.csv_count != '0'
        working-directory: src
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: /tmp/gcp_credentials.json
        run: |
          # スペースや括弧を含むファイル名に対応
          mapfile -t CSV_ARRAY < <(find ../data/ -name "*.csv" | sort)
          echo "処理対象: ${CSV_ARRAY[*]}"

          if [ -f "/tmp/gcp_credentials.json" ] && [ -n "$SPREADSHEET_ID" ]; then
            echo "Google Sheetsに出力します"
            python main.py "${CSV_ARRAY[@]}" --format google_sheets --config ../config/settings_ci.yaml
          else
            echo "Excel出力に切り替えます"
            python main.py "${CSV_ARRAY[@]}" --format excel --output ../output/収支レポート.xlsx
          fi

      - name: Excel出力をアーティファクトとして保存
        if: steps.check-last-day.outputs.is_last_day == 'true' && steps.check-csv.outputs.csv_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report
          path: output/*.xlsx
          retention-days: 90
          if-no-files-found: ignore
